<mat-sidenav-container class="container">

  <!-- ═══ SIDEBAR ═══ -->
  <mat-sidenav #sidebar mode="side" opened>
    <mat-nav-list>
      <a mat-list-item routerLink="/dashboard" routerLinkActive="active-link">
        <mat-icon matListItemIcon>dashboard</mat-icon>
        <span matListItemTitle>Dashboard</span>
      </a>
      <a mat-list-item routerLink="/Task" routerLinkActive="active-link">
        <mat-icon matListItemIcon>check_box</mat-icon>
        <span matListItemTitle>Task</span>
      </a>
      <a mat-list-item routerLink="/projects" routerLinkActive="active-link">
        <mat-icon matListItemIcon>folder_open</mat-icon>
        <span matListItemTitle>Projects</span>
      </a>
      <a mat-list-item routerLink="/reports" routerLinkActive="active-link">
        <mat-icon matListItemIcon>bar_chart</mat-icon>
        <span matListItemTitle>Report</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <!-- ═══ MAIN CONTENT ═══ -->
  <mat-sidenav-content>

    <mat-toolbar color="primary">
      <span>Admin Panel</span>
    </mat-toolbar>

    <div class="page-content">
      <router-outlet></router-outlet>
    </div>

  </mat-sidenav-content>

</mat-sidenav-container>
